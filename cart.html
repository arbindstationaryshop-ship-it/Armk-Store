<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart – Arbind Stationary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #cef542;
      --dark: #0808d0e2;
      --light: #f9f6ef;
      --ink: #0b0b0b;
      --accent: #0a0a0a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--light);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(26,26,46,0.95);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(245,200,66,0.2);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      font-size: 1.3rem;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .nav-links a {
      color: #ccc;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }

    /* ── PAGE ── */
    .page {
      max-width: 700px;
      margin: 2.5rem auto;
      padding: 0 1rem 4rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 0.4rem;
    }
    .underline {
      width: 50px; height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #999;
    }
    .empty a {
      display: inline-block;
      margin-top: 1.5rem;
      background: var(--dark);
      color: var(--gold);
      padding: 0.8rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    /* ── CART ITEM CARD ── */
    .cart-card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
    }
    .cart-card img {
      width: 80px; height: 80px;
      object-fit: contain;
      border-radius: 8px;
      background: #f0f0f0;
      padding: 6px;
      flex-shrink: 0;
    }
    .cart-info { flex: 1; }
    .cart-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .cart-price { color: #555; font-size: 0.85rem; }

    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }
    .qty-btn {
      background: var(--dark);
      color: var(--gold);
      border: none;
      width: 28px; height: 28px;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .qty-btn:hover { background: var(--accent); color: #fff; }
    .qty-num { font-weight: 600; min-width: 20px; text-align: center; }

    .item-total { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }

    .remove-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #bbb;
      transition: color 0.2s;
      padding: 0 0.3rem;
    }
    .remove-btn:hover { color: #e74c3c; }

    /* ── SUMMARY ── */
    .summary {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      margin-top: 1.5rem;
    }
    .summary h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .summary-row:last-of-type { border-bottom: none; }
    .grand-row {
      display: flex;
      justify-content: space-between;
      padding-top: 0.8rem;
      font-weight: 700;
      font-size: 1.1rem;
    }

    /* ── CUSTOMER DETAILS ── */
    .details-box {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      margin-top: 1.2rem;
    }
    .details-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    .details-box input,
    .details-box textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      margin-bottom: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .details-box input:focus,
    .details-box textarea:focus { border-color: var(--gold); }
    .details-box textarea { resize: vertical; min-height: 70px; }

    /* ── WHATSAPP BTN ── */
    .wa-order-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      width: 100%;
      background: #25d366;
      color: #fff;
      border: none;
      padding: 1.1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.2rem;
      text-decoration: none;
      transition: background 0.3s, transform 0.2s;
    }
    .wa-order-btn:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
    }
    .wa-icon { font-size: 1.4rem; }

    /* ── WA FLOAT ── */
    .wa-float {
      position: fixed;
      bottom: 2rem; left: 2rem;
      background: #25d366;
      color: #fff;
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(7,218,84,0.5);
      z-index: 98;
      transition: transform 0.3s;
    }
    .wa-float:hover { transform: scale(1.1); }

    footer {
      background: rgba(26,26,46,0.95);
      color: #aaa;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.82rem;
    }
    footer span { color: var(--gold); }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">✒ Arbind Stationary</a>
  <div class="nav-links">
    <a href="index.html#products">Products</a>
    <a href="cart.html">🛒 Cart</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<div class="page">
  <h1>🛒 My Cart</h1>
  <div class="underline"></div>
  <div id="cartBox"></div>
</div>

<a href="https://wa.me/917044726098" class="wa-float" target="_blank">💬</a>

<footer>
  <p>© 2024 <span>Arbind Stationary Store</span> — All Rights Reserved</p>
</footer>

<script>
  const WA_NUMBER = "917044726098"; // WhatsApp number

  function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
  }
  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function changeQty(index, change) {
    let cart = getCart();
    cart[index].qty = (cart[index].qty || 1) + change;
    if (cart[index].qty < 1) cart[index].qty = 1;
    saveCart(cart);
    render();
  }

  function removeItem(index) {
    let cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    render();
  }

  function parsePrice(priceStr) {
    const n = parseInt((priceStr + "").replace(/[^\d]/g, ""));
    return isNaN(n) ? 0 : n;
  }

  function render() {
    const cart = getCart();
    const box = document.getElementById("cartBox");
    box.innerHTML = "";

    if (cart.length === 0) {
      box.innerHTML = `
        <div class="empty">
          <div style="font-size:4rem;">🛒</div>
          <p style="margin-top:1rem;font-size:1.1rem;">Aapka cart khali hai!</p>
          <a href="index.html#products">🛍 Products Dekhein</a>
        </div>`;
      return;
    }

    // ── Item Cards ──
    let grandTotal = 0;
    let itemsHtml = "";
    let summaryRows = "";

    cart.forEach((item, index) => {
      const qty = item.qty || 1;
      const price = parsePrice(item.price);
      const total = qty * price;
      grandTotal += total;

      itemsHtml += `
        <div class="cart-card">
          <img src="${item.img}" alt="${item.name}"
               onerror="this.src=''; this.style.background='#eee';" />
          <div class="cart-info">
            <div class="cart-name">${item.name}</div>
            <div class="cart-price">₹${price} / piece</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
            </div>
          </div>
          <div class="item-total">₹${total}</div>
          <button class="remove-btn" onclick="removeItem(${index})" title="Remove">🗑</button>
        </div>`;

      summaryRows += `
        <div class="summary-row">
          <span>${item.name} × ${qty}</span>
          <span>₹${total}</span>
        </div>`;
    });

    // ── Order Summary ──
    const summaryHtml = `
      <div class="summary">
        <h3>Order Summary</h3>
        ${summaryRows}
        <div class="grand-row">
          <span>Grand Total</span>
          <span>₹${grandTotal}</span>
        </div>
      </div>`;

    // ── Customer Details + WhatsApp Button ──
    const detailsHtml = `
      <div class="details-box">
        <h3>📋 Delivery Details</h3>
        <input type="text" id="custName" placeholder="Aapka poora naam *" />
        <input type="tel" id="custPhone" placeholder="Phone number *" />
        <input type="text" id="custAddress" placeholder="Delivery address *" />
        <textarea id="custNote" placeholder="Koi special note? (optional)"></textarea>

        <button class="wa-order-btn" onclick="placeOrder()">
          <span class="wa-icon">💬</span>
          WhatsApp Pe Order Karo
        </button>
        <p style="text-align:center;font-size:0.78rem;color:#999;margin-top:0.7rem;">
          Button dabate hi aapka order seedha WhatsApp pe chala jayega ✅
        </p>
      </div>`;

    box.innerHTML = itemsHtml + summaryHtml + detailsHtml;
  }

  function placeOrder() {
    const name    = document.getElementById("custName").value.trim();
    const phone   = document.getElementById("custPhone").value.trim();
    const address = document.getElementById("custAddress").value.trim();
    const note    = document.getElementById("custNote").value.trim();

    if (!name || !phone || !address) {
      alert("⚠️ Kripya apna naam, phone aur address zaroor bharein.");
      return;
    }

    const cart = getCart();
    if (cart.length === 0) { alert("Cart khali hai!"); return; }

    // ── WhatsApp message banana ──
    let msg = "🛍 *Naya Order – Arbind Stationary Store*\n";
    msg += "━━━━━━━━━━━━━━━━━━━━\n";
    msg += `👤 *Naam:* ${name}\n`;
    msg += `📞 *Phone:* ${phone}\n`;
    msg += `📍 *Address:* ${address}\n`;
    if (note) msg += `📝 *Note:* ${note}\n`;
    msg += "━━━━━━━━━━━━━━━━━━━━\n";
    msg += "*🛒 Order Items:*\n";

    let grandTotal = 0;
    cart.forEach((item, i) => {
      const qty   = item.qty || 1;
      const price = parsePrice(item.price);
      const total = qty * price;
      grandTotal += total;
      msg += `${i + 1}. ${item.name} × ${qty} = ₹${total}\n`;
    });

    msg += "━━━━━━━━━━━━━━━━━━━━\n";
    msg += `💰 *Grand Total: ₹${grandTotal}*\n`;
    msg += "━━━━━━━━━━━━━━━━━━━━\n";
    msg += "Please confirm my order. Thank you! 🙏";

    const encoded = encodeURIComponent(msg);
    window.open(`https://wa.me/${WA_NUMBER}?text=${encoded}`, "_blank");
  }

  // ── First load ──
  render();
</script>
</body>
</html>
